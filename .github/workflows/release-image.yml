name: Release Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_ref:
        description: Commit SHA or ref to publish
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.sha }}

      - name: Validate manual recovery ref
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo 'Rejecting manual recovery because release_ref is not reachable from origin/main.' >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Prepare Linux runtime artifact
        run: bash scripts/prepare-linux-runtime-artifact.sh

      - name: Build release candidate image
        run: SKIP_PREPARE_RUNTIME_ARTIFACT=1 bash scripts/build-runtime-image.sh auth-mini:release-check

      - name: Validate entrypoint contract
        run: IMAGE_TAG=auth-mini:release-check SKIP_IMAGE_BUILD=1 bash docker/test-entrypoint.sh validation

      - name: Validate entrypoint supervision
        run: IMAGE_TAG=auth-mini:release-check SKIP_IMAGE_BUILD=1 bash docker/test-entrypoint.sh supervision

      - name: Run container smoke test
        run: IMAGE_TAG=auth-mini:release-check SKIP_IMAGE_BUILD=1 bash docker/test-image-smoke.sh

      - name: Decide publish plan
        id: publish
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(python -c "import json; print(json.load(open('package.json', encoding='utf-8'))['version'])")"
          image_owner="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          image_ref="ghcr.io/${image_owner}/auth-mini:${current_version}"

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "image_owner=$image_owner" >> "$GITHUB_OUTPUT"
          echo "should_publish=false" >> "$GITHUB_OUTPUT"
          echo "reason=image-exists" >> "$GITHUB_OUTPUT"

          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=$(git rev-parse HEAD)"
          echo "current_version=$current_version"
          echo "image_ref=$image_ref"

          if [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "reason=workflow-dispatch" >> "$GITHUB_OUTPUT"
            echo "publish decision: workflow_dispatch -> publish"
            exit 0
          fi

          if docker manifest inspect "$image_ref" >/dev/null 2>&1; then
            echo "publish decision: image already exists -> skip publish"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "reason=image-missing" >> "$GITHUB_OUTPUT"
            echo "publish decision: image missing -> publish"
          fi

      - name: Show publish plan
        run: |
          echo "should_publish=${{ steps.publish.outputs.should_publish }}"
          echo "reason=${{ steps.publish.outputs.reason }}"
          echo "current_version=${{ steps.publish.outputs.current_version }}"
          echo "image_owner=${{ steps.publish.outputs.image_owner }}"

      - name: Log in to GHCR
        if: steps.publish.outputs.should_publish == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image to GHCR
        if: steps.publish.outputs.should_publish == 'true'
        run: |
          export IMAGE_OWNER="${{ steps.publish.outputs.image_owner }}"
          export PACKAGE_VERSION="${{ steps.publish.outputs.current_version }}"
          docker buildx bake -f build/docker-bake.json release --push
