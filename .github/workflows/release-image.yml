name: Release Docker image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check release version consistency
        id: release_version
        run: npm run check:release-version -- ${{ github.ref_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image tags
        id: image_tags
        env:
          RELEASE_TAG: ${{ steps.release_version.outputs.tag }}
          RELEASE_MINOR: ${{ steps.release_version.outputs.minor }}
        run: |
          set -euo pipefail

          {
            printf 'full=ghcr.io/zccz14/auth-mini:%s\n' "$RELEASE_TAG"
            printf 'minor=ghcr.io/zccz14/auth-mini:%s\n' "$RELEASE_MINOR"
            printf 'latest=ghcr.io/zccz14/auth-mini:latest\n'
          } >>"$GITHUB_OUTPUT"

      - name: Build image and run smoke test
        env:
          IMAGE_TAG: auth-mini:release-smoke
          IMAGE_PLATFORM: linux/amd64
        run: bash docker/test-image-smoke.sh

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image_tags.outputs.full }}
            ${{ steps.image_tags.outputs.minor }}
            ${{ steps.image_tags.outputs.latest }}
