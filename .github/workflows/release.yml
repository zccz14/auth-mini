name: Release Rust binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: rust-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-rust-binary:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: auth-mini-rust-backend
            archive: auth-mini-rust-backend-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: auth-mini-rust-backend
            archive: auth-mini-rust-backend-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: auth-mini-rust-backend
            archive: auth-mini-rust-backend-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: auth-mini-rust-backend.exe
            archive: auth-mini-rust-backend-x86_64-pc-windows-msvc.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --manifest-path rust-backend/Cargo.toml --release --target ${{ matrix.target }} --target-dir rust-backend/target

      - name: Package archive and checksum
        env:
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import os
          import tarfile
          import zipfile

          target = os.environ["TARGET"]
          binary = os.environ["BINARY"]
          archive_name = os.environ["ARCHIVE"]

          binary_path = Path("rust-backend") / "target" / target / "release" / binary
          dist_dir = Path("dist")
          dist_dir.mkdir(exist_ok=True)
          archive_path = dist_dir / archive_name

          if archive_name.endswith(".zip"):
            with zipfile.ZipFile(archive_path, "w", zipfile.ZIP_DEFLATED) as archive:
              archive.write(binary_path, binary)
          else:
            with tarfile.open(archive_path, "w:gz") as archive:
              archive.add(binary_path, binary)

          checksum = hashlib.sha256(archive_path.read_bytes()).hexdigest()
          checksum_path = archive_path.with_name(f"{archive_name}.sha256")
          checksum_path.write_text(f"{checksum}  {archive_name}\n", encoding="utf-8")
          PY

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256
          generate_release_notes: true
