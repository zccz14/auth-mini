name: Release Rust binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: rust-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-rust-binary:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: auth-mini-rust-backend
            archive: auth-mini-rust-backend-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: auth-mini-rust-backend
            archive: auth-mini-rust-backend-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: auth-mini-rust-backend
            archive: auth-mini-rust-backend-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: auth-mini-rust-backend.exe
            archive: auth-mini-rust-backend-x86_64-pc-windows-msvc.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --manifest-path rust-backend/Cargo.toml --release --target ${{ matrix.target }} --target-dir rust-backend/target

      - name: Package archive and checksum
        env:
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
          ARCHIVE: ${{ matrix.archive }}
        run: python scripts/package-rust-release.py

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256
          generate_release_notes: true
