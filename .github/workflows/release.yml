name: Release Rust binaries

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: rust-release-latest
  cancel-in-progress: false

jobs:
  prepare-latest-release:
    name: Prepare latest release tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Move latest tag to this commit
        run: |
          git tag --force latest ${{ github.sha }}
          git push --force origin refs/tags/latest

  build-rust-binary:
    name: Build ${{ matrix.asset }}
    needs: prepare-latest-release
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: auth-mini
            asset: auth-mini-linux-x86_64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: auth-mini
            asset: auth-mini-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: auth-mini
            asset: auth-mini-macos-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: auth-mini.exe
            asset: auth-mini-windows-x86_64.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install root dependencies
        run: npm ci

      - name: Install demo dependencies
        run: npm --prefix examples/demo ci

      - name: Build embedded web assets
        run: npm run demo:build:web

      - name: Build release binary
        run: cargo build --manifest-path rust-backend/Cargo.toml --release --target ${{ matrix.target }} --target-dir rust-backend/target

      - name: Package archive and checksum
        env:
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
          ARCHIVE: ${{ matrix.asset }}
        run: python3 scripts/package-rust-release.py

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest auth-mini binaries
          body: |
            Latest Rust release binaries built from main.

            Assets include macOS, Windows, and Linux builds. Download the asset for your platform and verify it with the matching .sha256 file.
          files: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
          make_latest: true
          overwrite_files: true
