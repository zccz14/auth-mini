name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Verify build outputs
        run: |
          test -f dist/index.js
          test -f dist/sdk/singleton-iife.js

      - name: Check if version already exists
        id: check_version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version > /dev/null 2>&1; then
            echo "skip_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version already published: $PACKAGE_NAME@$PACKAGE_VERSION"
          else
            echo "skip_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version not yet published: $PACKAGE_NAME@$PACKAGE_VERSION"
          fi

      - name: Publish to npm
        if: steps.check_version.outputs.skip_publish == 'false'
        run: npm publish --provenance --access public
